{% extends "base.html" %}
{% block title %}查詢掛號 ｜ Fleur 小兒科診所{% endblock %}
{% block content %}

<div x-data="lookupApp()" class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold text-center text-gray-700 mb-8">查詢我的掛號</h1>

  <!-- Phone input form -->
  <div x-show="!searched" class="bg-white rounded-2xl border border-gray-200 p-8">
    <form @submit.prevent="search">
      <label class="block text-sm font-medium text-gray-700 mb-2">請輸入掛號時留的手機號碼</label>
      <input type="tel" x-model="phone" required
             class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 mb-4"
             placeholder="0912-345-678" />
      <button type="submit" :disabled="loading"
              class="w-full py-3 bg-teal-600 text-white rounded-xl font-semibold hover:bg-teal-700 transition-colors disabled:opacity-60">
        <span x-show="!loading">查詢</span>
        <span x-show="loading">查詢中…</span>
      </button>
    </form>
  </div>

  <!-- Results -->
  <div x-show="searched">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-semibold text-gray-700">查詢結果</h2>
      <button @click="reset()" class="text-sm text-teal-600 hover:underline">重新查詢</button>
    </div>

    <div x-show="appointments.length === 0" class="bg-white rounded-2xl border border-gray-200 p-8 text-center text-gray-400">
      查無掛號記錄
    </div>

    <div class="space-y-3">
      <template x-for="a in appointments" :key="a.id">
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <div class="flex justify-between items-start mb-3">
            <div>
              <span class="text-sm font-semibold text-gray-800" x-text="formatDate(a.date)"></span>
              <span class="ml-2 text-xs text-gray-500" x-text="typeLabel(a.appointment_type)"></span>
            </div>
            <span class="text-xs px-2 py-1 rounded-full font-medium"
                  :class="a.status === 'CONFIRMED' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                  x-text="statusLabel(a.status)"></span>
          </div>
          <div class="text-sm text-gray-600 space-y-1">
            <div>醫師：<span class="font-medium" x-text="a.doctor_name"></span></div>
            <div x-show="a.queue_number">候診號碼：<span class="font-bold text-teal-700 text-lg" x-text="a.queue_number + ' 號'"></span></div>
            <div x-show="a.start_time">預約時段：<span class="font-medium" x-text="a.start_time + ' – ' + a.end_time"></span></div>
          </div>
          <div x-show="a.status === 'CONFIRMED'" class="mt-3 border-t border-gray-100 pt-3">
            <button @click="cancel(a.id)"
                    class="text-xs text-red-500 hover:text-red-700 hover:underline">取消此預約</button>
          </div>
        </div>
      </template>
    </div>

    <div class="mt-6 text-center">
      <a href="/booking" class="inline-block px-6 py-2.5 bg-teal-600 text-white rounded-xl font-medium hover:bg-teal-700 transition-colors text-sm">
        新增掛號
      </a>
    </div>
  </div>
</div>

<script>
function lookupApp() {
  return {
    phone: '',
    loading: false,
    searched: false,
    appointments: [],

    formatDate(iso) {
      if (!iso) return '';
      const dt = new Date(iso + 'T00:00:00');
      const days = ['日', '一', '二', '三', '四', '五', '六'];
      return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} （週${days[dt.getDay()]}）`;
    },

    typeLabel(t) {
      return { NHI: '健保', PRIVATE_GROWTH: '自費－生長發育', PRIVATE_MENTAL: '自費－兒童心智' }[t] || t;
    },

    statusLabel(s) {
      return { CONFIRMED: '已確認', CANCELLED: '已取消', COMPLETED: '已完診', NO_SHOW: '未到診' }[s] || s;
    },

    async search() {
      this.loading = true;
      const res = await fetch(`/api/appointments/lookup?phone=${encodeURIComponent(this.phone)}`);
      this.appointments = await res.json();
      this.searched = true;
      this.loading = false;
    },

    async cancel(id) {
      if (!confirm('確定要取消此預約？')) return;
      const res = await fetch(`/api/appointments/${id}`, { method: 'DELETE' });
      if (res.ok) {
        await this.search();
      }
    },

    reset() {
      this.phone = '';
      this.searched = false;
      this.appointments = [];
    },
  };
}
</script>
{% endblock %}
